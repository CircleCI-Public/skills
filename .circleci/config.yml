version: 2.1

jobs:
  skill-evals:
    docker:
      - image: cimg/python:3.11
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install codex
          command: |
            source ~/.nvm/nvm.sh
            nvm install --lts
            npm install -g @openai/codex
      - run:
          name: Run CircleCI skill evals
          command: |
            evals/circleci/scripts/run_routing_evals_ci.sh

workflows:
  evals:
    jobs:
      - skill-evals
